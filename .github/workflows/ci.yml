name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  assets:
    name: Validate assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax-check JS
        run: node --check desk_rail/public/js/desk_rail.js

      - name: Validate JSON (doctype + fixtures)
        run: |
          python - <<'PY'
          import json, glob, sys
          for f in glob.glob("desk_rail/**/*.json", recursive=True):
              try:
                  json.load(open(f))
              except Exception as e:
                  print(f"INVALID JSON: {f}: {e}"); sys.exit(1)
          print("All JSON valid")
          PY
